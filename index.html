    <div class="container" id="welcome">
        <div id="welform">
            <form class="text-center bg-light">
                <p class="text-muted fw-bold mt-4">🌸 Welcome!</p>

                <input class="form-control rounded-pill" placeholder="Enter your name" type="text" id="f"/>

            </form>

        </div>
    </div>

        <p class=" text-muted mt-0" id="date"></p>
        
        </div>

  <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z"/>
</svg>
</svg></button>
        </form>
        </div>

    </div>
